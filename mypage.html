<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 예약 — MaruStay</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT@latest/fonts/static/woff2/SUIT.css">
  <style>
    :root {
      --brown-dk: #3d1e08;
      --brown:    #7a4520;
      --accent:   #c87c3a;
      --cream:    #fff8ec;
      --sand:     #f5e8d2;
      --text:     #3a2010;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SUIT', 'Pretendard', sans-serif;
      background: #fff8f2;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 520px; margin: 0 auto; padding: 0 16px 60px; }

    /* HEADER */
    .header {
      background: linear-gradient(145deg, var(--brown-dk) 0%, #7a4520 100%);
      padding: 24px 20px 28px;
      text-align: center;
      color: #fff;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      color: rgba(255,255,255,.65); font-size: 13px;
      text-decoration: none; margin-bottom: 10px;
      background: none; border: none; cursor: pointer;
      font-family: 'SUIT', 'Pretendard', sans-serif;
    }
    .back-btn:hover { color: #fff; }
    .header-logo { font-size: 20px; font-weight: 700; }
    .header-sub  { font-size: 12px; opacity: .6; margin-top: 2px; }

    /* LOGIN REQUIRED */
    .login-required {
      text-align: center; padding: 60px 20px;
    }
    .login-required .icon { font-size: 48px; margin-bottom: 16px; }
    .login-required h2    { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .login-required p     { font-size: 14px; color: var(--brown); margin-bottom: 24px; }
    .btn-home {
      display: inline-block;
      background: var(--accent); color: #fff;
      border-radius: 50px; padding: 12px 28px;
      font-size: 15px; font-weight: 700;
      font-family: 'SUIT', 'Pretendard', sans-serif;
      text-decoration: none;
    }

    /* USER CARD */
    .user-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 2px 16px rgba(140,80,20,.08);
      display: flex; align-items: center; gap: 14px;
    }
    .user-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--sand);
      flex-shrink: 0;
    }
    .user-name  { font-size: 16px; font-weight: 700; }
    .user-sub   { font-size: 13px; color: var(--brown); margin-top: 3px; }

    /* RESULTS */
    #results { margin-top: 16px; }
    .section-title {
      font-size: 15px; font-weight: 700;
      color: var(--brown); margin: 20px 0 12px;
    }
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--brown); font-size: 14px; line-height: 1.7;
    }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }

    .res-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 16px rgba(140,80,20,.08);
      border-left: 4px solid var(--accent);
    }
    .res-card.confirmed   { border-left-color: #5aaa50; }
    .res-card.checked_in  { border-left-color: #3a82f7; }
    .res-card.checked_out { border-left-color: #9c6fc8; }
    .res-card.cancelled   { border-left-color: #ccc; opacity: .7; }

    .res-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }
    .res-pet   { font-size: 17px; font-weight: 700; }
    .res-breed { font-size: 12px; color: var(--brown); margin-top: 2px; }

    .status-badge {
      font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px; white-space: nowrap;
    }
    .status-pending     { background: #fff3e0; color: #e67e00; }
    .status-confirmed   { background: #e8f5e9; color: #2e7d32; }
    .status-checked_in  { background: #e3f2fd; color: #1565c0; }
    .status-checked_out { background: #f3e5f5; color: #6a1b9a; }
    .status-cancelled   { background: #f5f5f5; color: #757575; }

    .res-info { font-size: 13px; color: var(--brown); line-height: 2; }
    .res-info strong { color: var(--text); }

    .res-footer { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-report {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--cream); color: var(--brown);
      border: 1.5px solid var(--sand); border-radius: 20px;
      padding: 7px 14px; font-size: 12px; font-weight: 600;
      font-family: 'SUIT', 'Pretendard', sans-serif;
      cursor: pointer; text-decoration: none;
      transition: background .2s;
    }
    .btn-report:hover { background: var(--sand); }

    .loading { text-align: center; padding: 40px; color: var(--brown); font-size: 14px; }

    /* 인증 카드 */
    .cert-banner {
      border-radius: 16px; padding: 18px 20px; margin-top: 14px;
      box-shadow: 0 2px 16px rgba(140,80,20,.08);
    }
    .cert-banner.none {
      background: linear-gradient(135deg, #fff8ec 0%, #fef3e2 100%);
      border: 1.5px dashed var(--accent);
    }
    .cert-banner.pending { background: #fff3e0; border: 1.5px solid #ffe0b2; }
    .cert-banner.basic   { background: linear-gradient(135deg, #e8f5e9, #f1f8f1); border: 1.5px solid #a5d6a7; }
    .cert-banner.trusted { background: linear-gradient(135deg, #e3f2fd, #eff8ff); border: 1.5px solid #90caf9; }
    .cert-banner.rejected{ background: #fafafa; border: 1.5px solid #eee; }

    .cert-title { font-size: 14px; font-weight: 800; margin-bottom: 6px; }
    .cert-desc  { font-size: 13px; line-height: 1.7; color: var(--brown); margin-bottom: 14px; }

    .cert-check-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
    .cert-check label {
      display: flex; align-items: center; gap: 6px;
      background: #fff; border: 1.5px solid var(--sand); border-radius: 20px;
      padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
      color: var(--brown); transition: all .15s;
    }
    .cert-check input[type=checkbox] { display: none; }
    .cert-check input:checked + span { color: var(--text); }
    .cert-check input:checked ~ span { color: var(--text); }
    .cert-check:has(input:checked) label { background: var(--cream); border-color: var(--accent); color: var(--text); }

    .cert-note {
      width: 100%; padding: 10px 14px; font-size: 13px;
      border: 1.5px solid var(--sand); border-radius: 10px; margin-bottom: 12px;
      font-family: 'SUIT', 'Pretendard', sans-serif; outline: none; resize: none;
      background: #fff;
    }
    .cert-note:focus { border-color: var(--accent); }

    .btn-cert {
      width: 100%; padding: 13px; font-size: 14px; font-weight: 800;
      background: linear-gradient(135deg, #c87c3a, #7a4520); color: #fff;
      border: none; border-radius: 12px; cursor: pointer;
      font-family: 'SUIT', 'Pretendard', sans-serif; transition: opacity .2s;
    }
    .btn-cert:hover { opacity: .88; }

    .badge-level {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 16px; font-weight: 800; margin-bottom: 4px;
    }
    .cert-benefit {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
    }
    .cert-benefit span {
      background: rgba(255,255,255,.7); border-radius: 20px;
      padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--brown);
    }
  </style>
</head>
<body>

  <div class="header">
    <div><a href="/" class="back-btn">← 홈으로</a></div>
    <div class="header-logo">🐾 MaruStay</div>
    <div class="header-sub">내 예약 조회</div>
  </div>

  <div class="container">

    <!-- 비로그인 -->
    <div id="loginRequired" class="login-required" style="display:none">
      <div class="icon">🔒</div>
      <h2>로그인이 필요해요</h2>
      <p>카카오 로그인 후 예약 내역을 확인할 수 있어요</p>
      <a href="/" class="btn-home">홈에서 로그인하기</a>
    </div>

    <!-- 로그인 상태 -->
    <div id="loggedIn" style="display:none">

      <!-- 사용자 카드 -->
      <div class="user-card">
        <img class="user-avatar" id="userAvatar" src="" alt="프로필"
             onerror="this.src='images/maru.jpg'">
        <div>
          <div class="user-name" id="userName"></div>
          <div class="user-sub">카카오 로그인으로 조회 중</div>
        </div>
      </div>

      <!-- 안심 보호자 인증 카드 -->
      <div id="certSection"></div>

      <!-- 마루 크레딧 카드 -->
      <div id="creditCard" style="display:none;background:#fff;border-radius:16px;padding:18px 20px;
           margin-top:14px;box-shadow:0 2px 16px rgba(140,80,20,.08);
           background:linear-gradient(135deg,#3d1e08 0%,#7a4520 100%);color:#fff;">
        <div style="font-size:12px;opacity:.7;margin-bottom:6px">💰 마루 크레딧</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:26px;font-weight:800" id="creditTotal">-</div>
            <div style="font-size:11px;opacity:.65;margin-top:2px">총 사용 가능 크레딧</div>
          </div>
          <div style="text-align:right;font-size:12px;opacity:.75;line-height:2">
            <div>💙 충전: <strong id="creditCharged">-</strong>원</div>
            <div>💚 마일리지: <strong id="creditEarned">-</strong>원</div>
            <div style="color:#ffd54f">🌟 미지급 이자: <strong id="creditInterest">-</strong>원</div>
          </div>
        </div>
      </div>

      <div id="results"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://sjzxpqtkpaehazwtonge.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqenhwcXRrcGFlaGF6d3RvbmdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTYwMTMsImV4cCI6MjA5NTE5MjAxM30.M8CqLiIQeOSfoWh-rpQ-lkrnUEWhU9pS7v72vUZfxIs';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const STATUS = {
      pending:     { text: '확인 대기 중', cls: 'status-pending' },
      confirmed:   { text: '예약 확정',    cls: 'status-confirmed' },
      checked_in:  { text: '입실 중',      cls: 'status-checked_in' },
      checked_out: { text: '퇴실 완료',    cls: 'status-checked_out' },
      cancelled:   { text: '취소됨',       cls: 'status-cancelled' },
    };
    const ROOM = {
      '소형견룸': '소형견룸', '중형견룸': '중형견룸',
      '애묘룸': '애묘룸', '오션뷰 힐링룸': '오션뷰 힐링룸',
      small: '소형견룸', medium: '중형견룸', cat: '애묘룸', ocean: '오션뷰 힐링룸',
    };

    // ── 초기화 ──────────────────────────────────────────────
    (function init() {
      const stored = localStorage.getItem('marustay_user');
      if (!stored) {
        document.getElementById('loginRequired').style.display = 'block';
        return;
      }
      try {
        const user = JSON.parse(stored);
        if (!user.kakaoId) {
          document.getElementById('loginRequired').style.display = 'block';
          return;
        }
        document.getElementById('loggedIn').style.display = 'block';
        document.getElementById('userAvatar').src = user.avatar || 'images/maru.jpg';
        document.getElementById('userName').textContent = user.nickname + '님';

        // kakao_id로 바로 조회 — 전화번호 입력 불필요
        loadReservations(user.kakaoId);
        loadCredits(user.kakaoId);
        loadCertification(user.kakaoId, user.nickname || '');
      } catch (e) {
        document.getElementById('loginRequired').style.display = 'block';
      }
    })();

    // ── 안심 보호자 인증 ─────────────────────────────────────
    const CERT_ITEMS = [
      { key: 'cert_emergency',    icon: '🚨', label: '비상연락망 2개 이상' },
      { key: 'cert_registration', icon: '🪪', label: '동물등록 완료' },
      { key: 'cert_vaccination',  icon: '💉', label: '예방접종 최신화' },
      { key: 'cert_neutered',     icon: '✂️', label: '중성화 완료' },
      { key: 'cert_insurance',    icon: '🛡️', label: '반려동물 보험' },
      { key: 'cert_education',    icon: '🎓', label: '교육 이수' },
    ];

    async function loadCertification(kakaoId, nickname) {
      const el = document.getElementById('certSection');
      const { data } = await db.rpc('get_my_certification', { p_kakao_id: kakaoId });

      if (!data || data.status === 'rejected') {
        // 미신청 or 반려 → 신청 폼 표시
        el.innerHTML = `
          <div class="cert-banner none">
            <div class="cert-title">🏅 안심 보호자 인증 신청</div>
            <div class="cert-desc">
              책임감 있는 보호자에게 마루 크레딧을 드려요.<br>
              <strong>기본 보호자 3,000원 · 안심 보호자 10,000원</strong> 크레딧 지급!<br>
              ${data?.status === 'rejected' && data.admin_note ? `<span style="color:#e74c3c;font-size:12px">반려 사유: ${esc(data.admin_note)}</span>` : ''}
            </div>
            <div class="cert-check-grid">${CERT_ITEMS.map(it => `
              <div class="cert-check">
                <label><input type="checkbox" id="ci_${it.key}"
                  ${data && data[it.key] ? 'checked' : ''}><span>${it.icon} ${it.label}</span></label>
              </div>`).join('')}
            </div>
            <textarea class="cert-note" id="certNote" rows="2"
              placeholder="한 마디 남겨주세요 (예: 강아지 등록증 지참 예정이에요)">${data?.applicant_note || ''}</textarea>
            <button class="btn-cert" onclick="submitCert('${kakaoId}','${esc(nickname)}')">인증 신청하기 →</button>
          </div>`;
      } else if (data.status === 'pending') {
        const checked = CERT_ITEMS.filter(it => data[it.key]);
        el.innerHTML = `
          <div class="cert-banner pending">
            <div class="cert-title">⏳ 인증 검토 중이에요</div>
            <div class="cert-desc">체크인 시 서류를 지참해주시면 확인 후 크레딧을 드려요!</div>
            <div class="cert-check-grid">${checked.map(it =>
              `<span style="display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(--sand);
               border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--brown)">
               ${it.icon} ${it.label}</span>`).join('')}
            </div>
            <button class="btn-cert" style="background:#aaa" onclick="loadCertification('${kakaoId}','${esc(nickname)}')">신청 내용 수정하기</button>
          </div>`;
      } else if (data.status === 'basic' || data.status === 'trusted') {
        const isBasic = data.status === 'basic';
        el.innerHTML = `
          <div class="cert-banner ${data.status}">
            <div class="badge-level">${isBasic ? '🐾 기본 보호자' : '⭐ 안심 보호자'} 인증 완료</div>
            <div style="font-size:13px;color:var(--brown)">
              믿을 수 있는 보호자로 인증되셨어요 💛<br>
              ${data.bonus_credited ? `<strong>${Number(data.bonus_credited).toLocaleString()}원</strong> 크레딧이 지급됐어요!` : ''}
            </div>
            <div class="cert-benefit">
              <span>✓ 크레딧 혜택 적용 중</span>
              ${!isBasic ? '<span>✓ 마일리지 우대 적립</span>' : ''}
              <span>✓ 예약 우선 배정</span>
            </div>
          </div>`;
      }
    }

    async function submitCert(kakaoId, nickname) {
      const vals = {};
      CERT_ITEMS.forEach(it => { vals[it.key] = document.getElementById('ci_' + it.key)?.checked || false; });
      const note = document.getElementById('certNote')?.value.trim() || '';

      if (!vals.cert_emergency && !vals.cert_registration) {
        alert('비상연락망 또는 동물등록 항목을 최소 1개 이상 체크해주세요.');
        return;
      }
      const { error } = await db.rpc('apply_certification', {
        p_kakao_id: kakaoId, p_nickname: nickname,
        p_cert_emergency:   vals.cert_emergency,
        p_cert_registration:vals.cert_registration,
        p_cert_vaccination: vals.cert_vaccination,
        p_cert_neutered:    vals.cert_neutered,
        p_cert_insurance:   vals.cert_insurance,
        p_cert_education:   vals.cert_education,
        p_applicant_note:   note,
      });
      if (error) { alert('오류: ' + error.message); return; }
      loadCertification(kakaoId, nickname);
    }

    // ── 크레딧 조회 ─────────────────────────────────────────
    async function loadCredits(kakaoId) {
      const { data, error } = await db.rpc('get_my_credits', { p_kakao_id: kakaoId });
      if (error || !data) return;
      const total = (data.total_balance || 0) + (data.accrued_interest || 0);
      if (total === 0 && !data.charged_balance && !data.earned_balance) return;
      document.getElementById('creditCard').style.display = 'block';
      document.getElementById('creditTotal').textContent    = Number(total).toLocaleString('ko-KR') + '원';
      document.getElementById('creditCharged').textContent  = Number(data.charged_balance||0).toLocaleString('ko-KR');
      document.getElementById('creditEarned').textContent   = Number(data.earned_balance||0).toLocaleString('ko-KR');
      document.getElementById('creditInterest').textContent = Number(data.accrued_interest||0).toLocaleString('ko-KR');
    }

    // ── 예약 조회 ────────────────────────────────────────────
    async function loadReservations(kakaoId) {
      const results = document.getElementById('results');
      results.innerHTML = '<div class="loading">🔍 예약 내역 조회 중...</div>';

      const { data, error } = await db.rpc('get_my_reservations_by_kakao', {
        p_kakao_id: kakaoId
      });

      if (error) {
        results.innerHTML = '<div class="empty"><div class="icon">⚠️</div>조회 중 오류가 발생했어요.<br><small style="color:#aaa">' + error.message + '</small></div>';
        return;
      }
      if (!data || data.length === 0) {
        results.innerHTML = `<div class="empty">
          <div class="icon">📋</div>
          아직 예약 내역이 없어요.<br><br>
          <a href="/#booking" style="color:var(--accent);font-weight:600;">첫 예약 신청하러 가기 →</a>
        </div>`;
        return;
      }

      results.innerHTML = '<div class="section-title">예약 내역 ' + data.length + '건</div>'
        + data.map(renderCard).join('');
    }

    // ── 카드 렌더링 ──────────────────────────────────────────
    function renderCard(r) {
      const st     = STATUS[r.status] || { text: r.status, cls: 'status-pending' };
      const room   = ROOM[r.room_type] || r.room_type || '미정';
      const fmt    = d => d ? new Date(d).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' }) : '-';
      const canReport = (r.status === 'checked_in' || r.status === 'checked_out');

      return `
        <div class="res-card ${r.status}">
          <div class="res-header">
            <div>
              <div class="res-pet">${r.pet_name || '이름 없음'}</div>
              <div class="res-breed">${r.pet_type || ''} ${r.pet_breed ? '· ' + r.pet_breed : ''}</div>
            </div>
            <span class="status-badge ${st.cls}">${st.text}</span>
          </div>
          <div class="res-info">
            <div>📅 <strong>체크인</strong>&nbsp; ${fmt(r.checkin_date)}</div>
            <div>📅 <strong>체크아웃</strong> ${fmt(r.checkout_date)}</div>
            <div>🏠 <strong>객실</strong>&nbsp;&nbsp;&nbsp; ${room}</div>
          </div>
          ${canReport ? `<div class="res-footer">
            <a class="btn-report" href="report.html?rid=${r.id}&pname=${encodeURIComponent(r.pet_name || '')}">📋 AI 알림장 보기</a>
          </div>` : ''}
        </div>`;
    }
  </script>
