<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — MaruStay</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css">
  <style>
    :root {
      --brown-dk: #3d1e08;
      --brown:    #7a4520;
      --accent:   #c87c3a;
      --cream:    #fff8ec;
      --sand:     #f5e8d2;
      --text:     #3a2010;
      --green:    #5aaa50;
      --blue:     #3a82f7;
      --purple:   #9c6fc8;
      --red:      #e74c3c;
      --gray:     #9e9e9e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', sans-serif;
      background: #f5f0eb;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-box {
      background: #fff; border-radius: 20px;
      padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 8px 40px rgba(60,30,8,.12);
      text-align: center;
    }
    .login-box h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .login-box p  { font-size: 13px; color: var(--brown); margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 14px 16px; font-size: 15px;
      border: 1.5px solid var(--sand); border-radius: 10px;
      font-family: 'Pretendard', sans-serif; margin-bottom: 12px;
      outline: none; transition: border .2s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
      background: var(--brown-dk); color: #fff; border: none;
      border-radius: 10px; cursor: pointer; font-family: 'Pretendard', sans-serif;
      transition: opacity .2s;
    }
    .login-box button:hover { opacity: .85; }
    #loginError {
      font-size: 13px; color: var(--red); margin-top: 10px; min-height: 20px;
    }

    /* ── ADMIN APP ── */
    #adminApp { display: none; }

    /* Header */
    .admin-header {
      background: var(--brown-dk); color: #fff;
      padding: 14px 24px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.2);
    }
    .admin-header h1 { font-size: 17px; font-weight: 800; }
    .admin-header span { font-size: 12px; opacity: .6; }
    .btn-logout {
      background: rgba(255,255,255,.12); color: #fff;
      border: 1px solid rgba(255,255,255,.2); border-radius: 20px;
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Pretendard', sans-serif;
      transition: background .2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.22); }

    /* Stats */
    .stats-row {
      display: flex; gap: 10px; padding: 16px 20px;
      background: #fff; border-bottom: 1px solid var(--sand);
      overflow-x: auto;
    }
    .stat-card {
      flex: 0 0 auto; min-width: 90px; text-align: center;
      background: var(--cream); border-radius: 12px;
      padding: 10px 14px; cursor: pointer;
      border: 2px solid transparent; transition: border .15s, background .15s;
    }
    .stat-card:hover { background: var(--sand); }
    .stat-card.active { border-color: var(--accent); background: var(--sand); }
    .stat-card .num { font-size: 22px; font-weight: 800; }
    .stat-card .lbl { font-size: 11px; color: var(--brown); margin-top: 2px; }
    .stat-card.s-pending    .num { color: #e67e00; }
    .stat-card.s-confirmed  .num { color: var(--green); }
    .stat-card.s-checked_in .num { color: var(--blue); }
    .stat-card.s-checked_out .num { color: var(--purple); }
    .stat-card.s-cancelled  .num { color: var(--gray); }

    /* Toolbar */
    .toolbar {
      display: flex; gap: 10px; padding: 12px 20px;
      background: #fff; border-bottom: 1px solid var(--sand);
      align-items: center; flex-wrap: wrap;
    }
    .toolbar input[type=search] {
      flex: 1; min-width: 180px; max-width: 320px;
      padding: 9px 14px; font-size: 14px;
      border: 1.5px solid var(--sand); border-radius: 8px;
      font-family: 'Pretendard', sans-serif; outline: none;
    }
    .toolbar input:focus { border-color: var(--accent); }
    .btn-refresh {
      padding: 9px 18px; background: var(--brown-dk); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      font-family: 'Pretendard', sans-serif; cursor: pointer; transition: opacity .2s;
    }
    .btn-refresh:hover { opacity: .85; }
    .toolbar-count { font-size: 13px; color: var(--brown); margin-left: auto; }

    /* Table wrapper */
    .table-wrap { overflow-x: auto; padding: 0 0 40px; }
    table {
      width: 100%; min-width: 760px; border-collapse: collapse;
      font-size: 13px;
    }
    thead tr { background: var(--brown-dk); color: #fff; }
    thead th { padding: 11px 14px; text-align: left; font-size: 12px; font-weight: 600; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #ede5d8; cursor: pointer; transition: background .12s; }
    tbody tr:hover { background: #fdf6ee; }
    tbody tr.expanded { background: #fdf0e0; }
    td { padding: 11px 14px; vertical-align: middle; }

    .pet-name  { font-weight: 700; }
    .pet-breed { font-size: 11px; color: var(--brown); }
    .owner-name  { font-weight: 600; }
    .owner-phone { font-size: 11px; color: var(--brown); }
    .date-range  { white-space: nowrap; }

    .status-badge {
      font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; white-space: nowrap; display: inline-block;
    }
    .status-pending     { background: #fff3e0; color: #e67e00; }
    .status-confirmed   { background: #e8f5e9; color: #2e7d32; }
    .status-checked_in  { background: #e3f2fd; color: #1565c0; }
    .status-checked_out { background: #f3e5f5; color: #6a1b9a; }
    .status-cancelled   { background: #f5f5f5; color: #757575; }

    .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .btn-status {
      padding: 4px 10px; font-size: 11px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      font-family: 'Pretendard', sans-serif; transition: opacity .2s;
    }
    .btn-status:hover { opacity: .8; }
    .btn-confirm  { background: #e8f5e9; color: #2e7d32; }
    .btn-checkin  { background: #e3f2fd; color: #1565c0; }
    .btn-checkout { background: #f3e5f5; color: #6a1b9a; }
    .btn-cancel   { background: #fce4e4; color: #c62828; }
    .btn-pending  { background: #fff3e0; color: #e67e00; }

    /* Expanded detail row */
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-row td {
      background: #fffbf5; padding: 16px 20px;
      border-bottom: 2px solid var(--sand);
    }
    .detail-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px 24px; margin-bottom: 16px;
    }
    .detail-item { font-size: 12px; line-height: 1.6; }
    .detail-item .key { color: var(--brown); font-weight: 600; }
    .detail-item .val { color: var(--text); }

    .memo-row { display: flex; gap: 10px; align-items: flex-end; }
    .memo-row textarea {
      flex: 1; min-height: 72px; padding: 10px; font-size: 13px;
      border: 1.5px solid var(--sand); border-radius: 8px; resize: vertical;
      font-family: 'Pretendard', sans-serif; outline: none;
    }
    .memo-row textarea:focus { border-color: var(--accent); }
    .btn-save-memo {
      padding: 10px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
      font-family: 'Pretendard', sans-serif; cursor: pointer; white-space: nowrap;
      transition: opacity .2s;
    }
    .btn-save-memo:hover { opacity: .85; }

    .loading-row td { text-align: center; padding: 60px; color: var(--brown); font-size: 14px; }
    .empty-row td   { text-align: center; padding: 60px; color: var(--brown); font-size: 14px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #3d1e08; color: #fff; padding: 12px 24px; border-radius: 50px;
      box-shadow: 0 8px 32px rgba(0,0,0,.25); font-size: 14px; font-weight: 600;
      z-index: 9999; white-space: nowrap; animation: fadeUp .3s ease;
      pointer-events: none;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateX(-50%) translateY(12px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🐾 MaruStay 관리자</h1>
    <p>관리자 비밀번호를 입력해주세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="doLogin()">로그인</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ── ADMIN APP ── -->
<div id="adminApp">

  <div class="admin-header">
    <div>
      <h1>🐾 MaruStay 관리자</h1>
      <span>예약 관리 대시보드</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card active" data-filter="all" onclick="setFilter('all')">
      <div class="num" id="cntAll">-</div>
      <div class="lbl">전체</div>
    </div>
    <div class="stat-card s-pending" data-filter="pending" onclick="setFilter('pending')">
      <div class="num" id="cntPending">-</div>
      <div class="lbl">대기 중</div>
    </div>
    <div class="stat-card s-confirmed" data-filter="confirmed" onclick="setFilter('confirmed')">
      <div class="num" id="cntConfirmed">-</div>
      <div class="lbl">예약 확정</div>
    </div>
    <div class="stat-card s-checked_in" data-filter="checked_in" onclick="setFilter('checked_in')">
      <div class="num" id="cntCheckedIn">-</div>
      <div class="lbl">입실 중</div>
    </div>
    <div class="stat-card s-checked_out" data-filter="checked_out" onclick="setFilter('checked_out')">
      <div class="num" id="cntCheckedOut">-</div>
      <div class="lbl">퇴실 완료</div>
    </div>
    <div class="stat-card s-cancelled" data-filter="cancelled" onclick="setFilter('cancelled')">
      <div class="num" id="cntCancelled">-</div>
      <div class="lbl">취소됨</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="search" id="searchBox" placeholder="🔍  이름, 연락처, 반려동물 검색..." oninput="renderTable()">
    <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
    <span class="toolbar-count" id="toolbarCount"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="resTable">
      <thead>
        <tr>
          <th>반려동물</th>
          <th>보호자</th>
          <th>일정</th>
          <th>객실</th>
          <th>상태</th>
          <th>상태 변경</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="loading-row"><td colspan="6">⏳ 데이터 로딩 중...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://sjzxpqtkpaehazwtonge.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqenhwcXRrcGFlaGF6d3RvbmdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTYwMTMsImV4cCI6MjA5NTE5MjAxM30.M8CqLiIQeOSfoWh-rpQ-lkrnUEWhU9pS7v72vUZfxIs';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMIN_PW_KEY = 'marustay_admin_pw';

  const STATUS_MAP = {
    pending:     { text: '확인 대기 중', cls: 'status-pending' },
    confirmed:   { text: '예약 확정',    cls: 'status-confirmed' },
    checked_in:  { text: '입실 중',      cls: 'status-checked_in' },
    checked_out: { text: '퇴실 완료',    cls: 'status-checked_out' },
    cancelled:   { text: '취소됨',       cls: 'status-cancelled' },
  };

  const ROOM_MAP = {
    small: '소형견룸', medium: '중형견룸', cat: '애묘룸', ocean: '오션뷰 힐링룸',
    '소형견룸': '소형견룸', '중형견룸': '중형견룸', '애묘룸': '애묘룸', '오션뷰 힐링룸': '오션뷰 힐링룸',
  };

  let allData   = [];
  let curFilter = 'all';
  let adminPw   = '';

  // ── LOGIN ──────────────────────────────────────────────────────────
  (function checkSession() {
    const pw = sessionStorage.getItem(ADMIN_PW_KEY);
    if (pw) { adminPw = pw; showApp(); loadData(); }
  })();

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pw = document.getElementById('pwInput').value.trim();
    if (!pw) return;
    document.querySelector('.login-box button').textContent = '확인 중...';
    const { data, error } = await db.rpc('admin_get_all_reservations', { p_password: pw });
    document.querySelector('.login-box button').textContent = '로그인';
    if (error || data === null) {
      document.getElementById('loginError').textContent = '비밀번호가 올바르지 않아요.';
      return;
    }
    adminPw = pw;
    sessionStorage.setItem(ADMIN_PW_KEY, pw);
    allData = data || [];
    showApp();
    renderStats();
    renderTable();
  }

  function doLogout() {
    sessionStorage.removeItem(ADMIN_PW_KEY);
    adminPw = '';
    allData = [];
    document.getElementById('adminApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('pwInput').value = '';
    document.getElementById('loginError').textContent = '';
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
  }

  // ── DATA ───────────────────────────────────────────────────────────
  async function loadData() {
    document.getElementById('tbody').innerHTML =
      '<tr class="loading-row"><td colspan="6">⏳ 불러오는 중...</td></tr>';
    const { data, error } = await db.rpc('admin_get_all_reservations', { p_password: adminPw });
    if (error) { showToast('⚠ 조회 오류: ' + error.message); return; }
    allData = data || [];
    renderStats();
    renderTable();
  }

  // ── STATS ──────────────────────────────────────────────────────────
  function renderStats() {
    const cnt = { all: allData.length, pending: 0, confirmed: 0, checked_in: 0, checked_out: 0, cancelled: 0 };
    allData.forEach(r => { if (cnt[r.status] !== undefined) cnt[r.status]++; });
    document.getElementById('cntAll').textContent        = cnt.all;
    document.getElementById('cntPending').textContent    = cnt.pending;
    document.getElementById('cntConfirmed').textContent  = cnt.confirmed;
    document.getElementById('cntCheckedIn').textContent  = cnt.checked_in;
    document.getElementById('cntCheckedOut').textContent = cnt.checked_out;
    document.getElementById('cntCancelled').textContent  = cnt.cancelled;
  }

  function setFilter(f) {
    curFilter = f;
    document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
    document.querySelector('.stat-card[data-filter="' + f + '"]').classList.add('active');
    renderTable();
  }

  // ── TABLE ──────────────────────────────────────────────────────────
  function renderTable() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    let rows = allData;
    if (curFilter !== 'all') rows = rows.filter(r => r.status === curFilter);
    if (q) rows = rows.filter(r =>
      (r.pet_name    || '').toLowerCase().includes(q) ||
      (r.owner_name  || '').toLowerCase().includes(q) ||
      (r.owner_phone || '').includes(q) ||
      (r.pet_breed   || '').toLowerCase().includes(q)
    );
    document.getElementById('toolbarCount').textContent = rows.length + '건';
    if (!rows.length) {
      document.getElementById('tbody').innerHTML =
        '<tr class="empty-row"><td colspan="6">📋 해당하는 예약이 없어요</td></tr>';
      return;
    }
    document.getElementById('tbody').innerHTML = rows.map(buildRow).join('');
  }

  function buildRow(r) {
    const st   = STATUS_MAP[r.status] || { text: r.status, cls: 'status-pending' };
    const room = ROOM_MAP[r.room_type] || r.room_type || '미정';
    const fmt  = d => d ? new Date(d).toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }) : '-';

    const actionBtns = buildActionBtns(r);

    const mainRow = `
      <tr id="row-${r.id}" onclick="toggleDetail('${r.id}')">
        <td>
          <div class="pet-name">${esc(r.pet_name || '이름 없음')}</div>
          <div class="pet-breed">${esc(r.pet_type || '')}${r.pet_breed ? ' · ' + esc(r.pet_breed) : ''}</div>
        </td>
        <td>
          <div class="owner-name">${esc(r.owner_name || '-')}</div>
          <div class="owner-phone">${esc(r.owner_phone || '')}</div>
        </td>
        <td class="date-range">${fmt(r.checkin_date)} ~ ${fmt(r.checkout_date)}</td>
        <td>${esc(room)}</td>
        <td><span class="status-badge ${st.cls}">${st.text}</span></td>
        <td><div class="action-btns" onclick="event.stopPropagation()">${actionBtns}</div></td>
      </tr>`;

    const detailRow = `
      <tr class="detail-row" id="detail-${r.id}">
        <td colspan="6">${buildDetail(r)}</td>
      </tr>`;

    return mainRow + detailRow;
  }

  function buildActionBtns(r) {
    const b = [];
    if (r.status === 'pending')
      b.push(`<button class="btn-status btn-confirm"  onclick="changeStatus('${r.id}','confirmed')">✓ 확정</button>`);
    if (r.status === 'confirmed')
      b.push(`<button class="btn-status btn-checkin"  onclick="changeStatus('${r.id}','checked_in')">입실</button>`);
    if (r.status === 'checked_in')
      b.push(`<button class="btn-status btn-checkout" onclick="changeStatus('${r.id}','checked_out')">퇴실</button>`);
    if (r.status !== 'cancelled' && r.status !== 'checked_out')
      b.push(`<button class="btn-status btn-cancel"   onclick="changeStatus('${r.id}','cancelled')">취소</button>`);
    if (r.status === 'cancelled')
      b.push(`<button class="btn-status btn-pending"  onclick="changeStatus('${r.id}','pending')">복구</button>`);
    return b.join('');
  }

  function buildDetail(r) {
    const yn  = v => (v === true || v === 'true' || v === 'yes') ? '예' : (v === false || v === 'false' || v === 'no') ? '아니오' : (v || '-');
    const val = v => v || '-';
    const fmtFull = d => d ? new Date(d).toLocaleString('ko-KR') : '-';

    return `
      <div class="detail-grid">
        <div class="detail-item"><span class="key">반려동물 이름</span><br><span class="val">${esc(val(r.pet_name))}</span></div>
        <div class="detail-item"><span class="key">종류 / 품종</span><br><span class="val">${esc(val(r.pet_type))}${r.pet_breed ? ' / ' + esc(r.pet_breed) : ''}</span></div>
        <div class="detail-item"><span class="key">나이</span><br><span class="val">${esc(val(r.pet_age))}</span></div>
        <div class="detail-item"><span class="key">성별 / 중성화</span><br><span class="val">${esc(val(r.pet_gender))} / ${yn(r.pet_neutered)}</span></div>
        <div class="detail-item"><span class="key">체중</span><br><span class="val">${val(r.pet_weight)} kg</span></div>
        <div class="detail-item"><span class="key">동물등록번호</span><br><span class="val">${esc(val(r.pet_reg_no))}</span></div>
        <div class="detail-item"><span class="key">접종 여부</span><br><span class="val">${yn(r.pet_vaccinated)}</span></div>
        <div class="detail-item"><span class="key">물림사고 이력</span><br><span class="val">${yn(r.pet_bite)}</span></div>
        <div class="detail-item"><span class="key">분리불안</span><br><span class="val">${yn(r.pet_anxiety)}</span></div>
        <div class="detail-item"><span class="key">알레르기</span><br><span class="val">${esc(val(r.pet_allergy))}</span></div>
        <div class="detail-item"><span class="key">복용 약물</span><br><span class="val">${esc(val(r.pet_medications))}</span></div>
        <div class="detail-item"><span class="key">특이사항</span><br><span class="val">${esc(val(r.pet_notes))}</span></div>
        <div class="detail-item"><span class="key">보호자 이름</span><br><span class="val">${esc(val(r.owner_name))}</span></div>
        <div class="detail-item"><span class="key">연락처</span><br><span class="val">${esc(val(r.owner_phone))}</span></div>
        <div class="detail-item"><span class="key">이메일</span><br><span class="val">${esc(val(r.owner_email))}</span></div>
        <div class="detail-item"><span class="key">주소</span><br><span class="val">${esc(val(r.owner_address))}</span></div>
        <div class="detail-item"><span class="key">비상연락처</span><br><span class="val">${esc(val(r.owner_emergency))}</span></div>
        <div class="detail-item"><span class="key">픽업 서비스</span><br><span class="val">${esc(val(r.pickup_service))}</span></div>
        <div class="detail-item"><span class="key">하이오더 요청</span><br><span class="val">${yn(r.hiorder_requested)}</span></div>
        <div class="detail-item"><span class="key">요청사항</span><br><span class="val">${esc(val(r.requests))}</span></div>
        <div class="detail-item"><span class="key">개인정보 동의</span><br><span class="val">${yn(r.consent_privacy)}</span></div>
        <div class="detail-item"><span class="key">CCTV 동의</span><br><span class="val">${yn(r.consent_cctv)}</span></div>
        <div class="detail-item"><span class="key">AI 동의</span><br><span class="val">${yn(r.consent_ai)}</span></div>
        <div class="detail-item"><span class="key">마케팅 동의</span><br><span class="val">${yn(r.consent_marketing)}</span></div>
        <div class="detail-item"><span class="key">신청 일시</span><br><span class="val">${fmtFull(r.created_at)}</span></div>
        <div class="detail-item"><span class="key">예약 ID</span><br><span class="val" style="font-size:10px;word-break:break-all">${r.id}</span></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--brown);margin-bottom:6px;">📝 관리자 메모</div>
      <div class="memo-row">
        <textarea id="memo-${r.id}" placeholder="내부 메모를 입력하세요...">${esc(r.admin_memo || '')}</textarea>
        <button class="btn-save-memo" onclick="saveMemo('${r.id}')">저장</button>
      </div>
      ${(r.status === 'checked_in' || r.status === 'checked_out') ? `
      <div style="margin-top:14px">
        <a href="admin-report.html?rid=${r.id}&pname=${encodeURIComponent(r.pet_name || '반려동물')}&email=${encodeURIComponent(r.owner_email || '')}&oname=${encodeURIComponent(r.owner_name || '')}"
           onclick="event.stopPropagation()"
           style="display:inline-flex;align-items:center;gap:6px;background:#fff3e0;color:#e67e00;
                  border:1.5px solid #ffe0b2;border-radius:20px;padding:8px 16px;
                  font-size:13px;font-weight:700;text-decoration:none;transition:background .15s;"
           onmouseover="this.style.background='#ffe0b2'" onmouseout="this.style.background='#fff3e0'">
          📋 AI 알림장 관리
        </a>
      </div>` : ''}
`;
  }

  function toggleDetail(id) {
    const row = document.getElementById('detail-' + id);
    if (!row) return;
    const isOpen = row.classList.contains('open');
    document.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
    document.querySelectorAll('tbody tr.expanded').forEach(r => r.classList.remove('expanded'));
    if (!isOpen) {
      row.classList.add('open');
      const main = document.getElementById('row-' + id);
      if (main) main.classList.add('expanded');
    }
  }

  // ── STATUS CHANGE ──────────────────────────────────────────────────
  async function changeStatus(id, status) {
    const { error } = await db.rpc('admin_update_status', {
      p_id: id, p_status: status, p_password: adminPw
    });
    if (error) { showToast('⚠ 상태 변경 오류: ' + error.message); return; }
    const item = allData.find(r => r.id === id);
    if (item) item.status = status;
    renderStats();
    renderTable();
    showToast('✓ 상태가 변경되었어요');

    // 예약 확정 시 손님 이메일 발송
    if (status === 'confirmed' && item?.owner_email) {
      try {
        await fetch('/api/send-email', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'reservation_confirmed',
            data: {
              ownerName:    item.owner_name,
              ownerEmail:   item.owner_email,
              petName:      item.pet_name,
              checkinDate:  item.checkin_date,
              checkoutDate: item.checkout_date,
              roomType:     item.room_type,
            },
          }),
        });
      } catch (e) { console.warn('[email] 발송 실패:', e); }
    }
  }

  // ── MEMO SAVE ──────────────────────────────────────────────────────
  async function saveMemo(id) {
    const memo = (document.getElementById('memo-' + id) || {}).value || '';
    const { error } = await db.rpc('admin_update_memo', {
      p_id: id, p_memo: memo, p_password: adminPw
    });
    if (error) { showToast('⚠ 메모 저장 오류: ' + error.message); return; }
    const item = allData.find(r => r.id === id);
    if (item) item.admin_memo = memo;
    showToast('✓ 메모가 저장되었어요');
  }

  // ── UTILS ──────────────────────────────────────────────────────────
  function esc(str) {
    return String(str === null || str === undefined ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
</script>
</body>
</html>
