<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 알림장 — MaruStay</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT@latest/fonts/static/woff2/SUIT.css">
  <style>
    :root {
      --brown-dk: #3d1e08;
      --brown:    #7a4520;
      --accent:   #c87c3a;
      --cream:    #fff8ec;
      --sand:     #f5e8d2;
      --text:     #3a2010;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SUIT', 'Pretendard', sans-serif;
      background: #fff8f2;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 520px; margin: 0 auto; padding: 0 16px 60px; }

    /* HEADER */
    .header {
      background: linear-gradient(145deg, var(--brown-dk) 0%, #7a4520 100%);
      padding: 24px 20px 28px;
      text-align: center;
      color: #fff;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      color: rgba(255,255,255,.65); font-size: 13px;
      text-decoration: none; margin-bottom: 10px;
      background: none; border: none; cursor: pointer;
      font-family: 'SUIT', 'Pretendard', sans-serif;
    }
    .back-btn:hover { color: #fff; }
    .header-pet   { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .header-sub   { font-size: 13px; opacity: .65; }

    /* EMPTY / LOADING */
    .state-box {
      text-align: center; padding: 60px 20px;
      color: var(--brown); font-size: 14px; line-height: 1.8;
    }
    .state-box .icon { font-size: 44px; margin-bottom: 14px; }

    /* REPORT CARD */
    .report-card {
      background: #fff;
      border-radius: 20px;
      padding: 22px 22px 20px;
      margin-top: 18px;
      box-shadow: 0 3px 20px rgba(140,80,20,.09);
      position: relative;
      overflow: hidden;
    }
    .report-card::before {
      content: '🐾';
      position: absolute; top: -6px; right: 14px;
      font-size: 52px; opacity: .06;
    }

    .report-date {
      font-size: 13px; font-weight: 700;
      color: var(--accent); margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .report-date::after {
      content: ''; flex: 1;
      height: 1px; background: var(--sand);
    }

    /* 이모지 지표 뱃지 */
    .badges {
      display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--cream); border-radius: 20px;
      padding: 5px 11px; font-size: 12px; font-weight: 600;
      color: var(--brown);
    }

    /* 본문 */
    .report-content {
      font-size: 14px; line-height: 1.85;
      color: var(--text); white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="header">
    <div><a href="javascript:history.back()" class="back-btn">← 뒤로</a></div>
    <div class="header-pet" id="headerPet">🐾 알림장</div>
    <div class="header-sub">마루스테이에서 보내는 하루 소식</div>
  </div>

  <div class="container">
    <div id="content">
      <div class="state-box"><div class="icon">⏳</div>불러오는 중...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://sjzxpqtkpaehazwtonge.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqenhwcXRrcGFlaGF6d3RvbmdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTYwMTMsImV4cCI6MjA5NTE5MjAxM30.M8CqLiIQeOSfoWh-rpQ-lkrnUEWhU9pS7v72vUZfxIs';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params  = new URLSearchParams(location.search);
    const rid     = params.get('rid');
    const petName = params.get('pname') || '우리 아이';

    document.getElementById('headerPet').textContent = `🐾 ${petName}의 알림장`;
    document.title = `${petName}의 알림장 — MaruStay`;

    const MEAL_LABEL = { great:'밥 아주 잘 먹음', good:'밥 잘 먹음', little:'밥 조금 먹음', none:'밥 잘 안 먹음' };
    const COND_LABEL = { great:'컨디션 최고 🎉', good:'컨디션 좋음', normal:'컨디션 보통', anxious:'예민함 🤍' };
    const WALK_LABEL = { great:'산책 신나게 🐕', short:'산책 짧게', none:'실내 휴식' };
    const SLEP_LABEL = { great:'잠 푹 잠 😴', good:'잠 잘 잠 😴', poor:'잠 설침' };
    const SOCI_LABEL = { friendly:'친구들과 잘 어울림 🐾', normal:'편안히 지냄', shy:'조용히 지냄' };

    (async function load() {
      if (!rid) {
        document.getElementById('content').innerHTML =
          '<div class="state-box"><div class="icon">⚠️</div>잘못된 접근이에요.</div>';
        return;
      }

      const { data, error } = await db.rpc('get_reports_by_reservation', { p_reservation_id: rid });

      if (error) {
        document.getElementById('content').innerHTML =
          '<div class="state-box"><div class="icon">⚠️</div>불러오는 중 오류가 발생했어요.<br><small>' + error.message + '</small></div>';
        return;
      }

      if (!data || data.length === 0) {
        document.getElementById('content').innerHTML =
          '<div class="state-box"><div class="icon">📋</div>아직 작성된 알림장이 없어요.<br>입실 후 선생님들이 작성해드릴게요 🐾</div>';
        return;
      }

      document.getElementById('content').innerHTML = data.map(r => {
        const d    = new Date(r.report_date);
        const dateStr = d.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'long' });
        const badges = [
          r.meal_amount  ? `<span class="badge">🍚 ${MEAL_LABEL[r.meal_amount] || r.meal_amount}</span>` : '',
          r.condition    ? `<span class="badge">💛 ${COND_LABEL[r.condition]   || r.condition}</span>`   : '',
          r.walk         ? `<span class="badge">🌿 ${WALK_LABEL[r.walk]        || r.walk}</span>`        : '',
          r.sleep_quality? `<span class="badge">🌙 ${SLEP_LABEL[r.sleep_quality]||r.sleep_quality}</span>`:'',
          r.social       ? `<span class="badge">🐾 ${SOCI_LABEL[r.social]      || r.social}</span>`     : '',
        ].filter(Boolean).join('');

        return `
          <div class="report-card">
            <div class="report-date">📅 ${dateStr}</div>
            <div class="badges">${badges}</div>
            <div class="report-content">${esc(r.content || '')}</div>
          </div>`;
      }).join('');
    })();

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
